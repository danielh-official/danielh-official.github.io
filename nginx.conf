server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use relative redirects so the browser keeps the correct port (e.g. :8080)
    absolute_redirect off;

    # Explicit redirects with $http_host so the port (e.g. :8080) is preserved
    # when adding trailing slash. Add a similar block for each top-level route
    # that is a directory (e.g. /projects/index.html).
    location = /projects {
        return 301 $scheme://$http_host/projects/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
